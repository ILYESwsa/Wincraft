name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  native:
    name: Build native DLL (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release DLL
        working-directory: native
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Stage DLL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path native/target/release
          Copy-Item native/target/x86_64-pc-windows-msvc/release/wincraft.dll native/target/release/wincraft.dll

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: wincraft-dll
          path: native/target/release/wincraft.dll
          if-no-files-found: error

  mod:
    name: Build Fabric mod jar
    runs-on: ubuntu-latest
    needs: native
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Download native DLL
        uses: actions/download-artifact@v4
        with:
          name: wincraft-dll
          path: native/target/release

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build mod jar
        run: ./gradlew :fabric:build --stacktrace

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: wincraft-mod
          path: fabric/build/libs/*.jar
          if-no-files-found: error

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: mod
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download mod jar
        uses: actions/download-artifact@v4
        with:
          name: wincraft-mod
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.jar
          generate_release_notes: true
